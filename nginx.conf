server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Evita errores 500 en archivos que no existen
    error_page 404 /index.html;

    # Compresión
    gzip on;
    gzip_types text/html text/css application/javascript image/svg+xml;
}
